version: '3'

services:
  app:
    build: .
    container_name: unit_converter
    restart: always
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/ssl:/etc/letsencrypt:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/ssl:/etc/letsencrypt
    entrypoint: /bin/sh -c "sleep 12h && while true; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
